name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Prepare project
        run: |
          cp calculator_kivy.py main.py

      - name: Create Briefcase project
        run: |
          briefcase new
          # Overwrite with our config
          cat > pyproject.toml << 'EOF'
          [tool.briefcase]
          project_name = "计算器"
          bundle = "org.calculator"
          version = "1.0"
          url = "https://github.com/shulin33/calculator"
          license = "MIT"
          author = "shulin33"
          author_email = "shulin33@example.com"

          [tool.briefcase.app.calculator]
          formal_name = "计算器"
          bundle = "org.calculator"
          version = "1.0"
          url = "https://github.com/shulin33/calculator"
          license = "MIT"
          icon = "./icons/calculator"
          sources = [
              "calculator/main.py",
          ]
          requires = [
              "kivy",
          ]

          [tool.briefcase.app.calculator.macOS]
          requires = []

          [tool.briefcase.app.calculator.iOS]
          requires = []
          provisioning_profile = ""
          codesign_identity = ""
          entitlements = ""
          plist = {}

          [tool.briefcase.app.calculator.watchOS]
          requires = []
          EOF

      - name: Build iOS IPA
        run: |
          briefcase create iOS
          briefcase build iOS

      - name: Archive IPA
        run: |
          find . -name "*.ipa" -exec echo "Found: {}" \;

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: calculator-ios-ipa
          path: "**/*.ipa"
