name: Build APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install kivy==2.3.0 buildozer cython==3.0.11

      - name: Prepare project
        run: |
          cp calculator_kivy.py main.py

      - name: Build APK
        run: |
          # Set ANDROID_HOME to where buildozer will install SDK
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          # Download and install latest cmdline-tools
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O ct.zip
          unzip -q ct.zip
          mv cmdline-tools latest
          # Accept licenses
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          # Install build-tools and platform-tools
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "build-tools;34.0.0" "platform-tools"
          # Now build
          buildozer android debug
        env:
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator-debug-apk
          path: bin/*.apk
