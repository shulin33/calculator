name: Build APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip

      - name: Install build dependencies
        run: |
          sudo apt-get install -y --no-install-recommends \
            autoconf automake libtool pkg-config build-essential \
            libffi-dev zlib1g-dev libbz2-dev libssl-dev libreadline-dev \
            libsqlite3-dev libncurses5-dev libncursesw5-dev libgdbm-dev \
            liblzma-dev gettext wget curl

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip setuptools
          pip install buildozer cython==3.0.11

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator-debug-apk
          path: bin/*.apk
