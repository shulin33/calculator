name: Build APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip

      - name: Install build dependencies
        run: |
          sudo apt-get install -y --no-install-recommends \
            autoconf automake libtool pkg-config build-essential \
            libffi-dev zlib1g-dev libbz2-dev libssl-dev libreadline-dev \
            libsqlite3-dev libncurses5-dev libncursesw5-dev libgdbm-dev \
            liblzma-dev gettext

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install kivy==2.3.0 buildozer cython==3.0.11

      - name: Prepare project
        run: |
          cp calculator_kivy.py main.py

      - name: Build APK
        run: |
          buildozer android debug
        env:
          P4A_REQUIREMENTS: python3,kivy
          P4A_LIBFFI_VERSION: 3.4.2

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator-debug-apk
          path: bin/*.apk
