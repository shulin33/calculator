name: Build APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install kivy==2.3.0 buildozer cython==3.0.11

      - name: Prepare project
        run: |
          cp calculator_kivy.py main.py

      - name: Build APK
        run: |
          # Accept all Android SDK licenses first
          yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME 2>/dev/null || true
          # Then build
          buildozer android debug
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator-debug-apk
          path: bin/*.apk
